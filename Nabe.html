<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NaBe 專業結帳計算機</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --primary: #85B8D5; 
    --primary-dark: #1A3C5E; 
    --primary-light: #EBF5FB; 
    --gold: #A9C2D3; 
    --bg-light: #F4FAFF; 
  }
  body { background-color: var(--bg-light); font-family: "PingFang TC", sans-serif; padding-bottom: 120px; }
  
  .sticky-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(5px);
    box-shadow: 0 4px 15px rgba(133, 184, 213, 0.1);
    border-bottom: 2px solid var(--primary);
  }
  
  .nav-bar {
    display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px;
    background: #FFF; white-space: nowrap; scrollbar-width: none;
  }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-btn {
    padding: 6px 14px; background: var(--primary-light); color: var(--primary-dark);
    border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--primary);
  }

  .total-display { font-size: 2.2rem; font-weight: 700; color: #1A3C5E; font-family: 'Georgia', serif; line-height: 1; }
  .original-display { font-size: 0.9rem; color: #777; }
  
  .btn-copy {
    width: 100%; background: var(--primary-light); color: var(--primary); border: 1px solid var(--primary);
    padding: 10px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; transition: 0.3s;
  }
  .btn-copy:disabled { background: #f3f4f6; color: #9ca3af; border-color: #d1d5db; cursor: not-allowed; }

  .custom-input {
    width: 100%; padding: 10px; border: 1px solid #BEE3F8; border-radius: 8px;
    font-size: 16px; text-align: right; color: var(--primary-dark);
  }

  /* 數量輸入框樣式 */
  .qty-input {
    width: 45px; border: 1px solid var(--primary); border-radius: 4px;
    text-align: center; font-weight: bold; color: var(--primary-dark);
    padding: 2px; margin-left: 10px; display: none;
  }
  .service-cb:checked ~ .qty-input { display: block; }

  .service-label {
    display: flex; justify-content: space-between; align-items: center; flex: 1;
    padding: 12px 15px; border: 1px solid #EEE; border-radius: 12px;
    background: #FFF; transition: 0.2s;
  }
  .item-wrapper { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .service-cb:checked + .service-label { background-color: var(--primary-light); border-color: var(--primary); }

  .fab-group { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 60; }
  .fab-btn {
    width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
  }
  .fab-top { background: #FFF; color: var(--primary-dark); border: 1px solid var(--primary); opacity: 0; pointer-events: none; }
  .fab-top.show { opacity: 1; pointer-events: auto; }
  .fab-reset { background: #E57373; color: white; border: none; }

  .error-box { 
    background-color: #FEF2F2; border: 2px solid #FCA5A5; color: #B91C1C; 
    padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; 
    display: none; margin-top: 10px; line-height: 1.4;
  }
</style>
</head>

function render() {
  let h = "", n = "";
  let gIdx = 0;
  for (let cat in Data) {
    let catID = `cat-${gIdx}`;
    n += `<button class="nav-btn" onclick="document.getElementById('${catID}').scrollIntoView({behavior:'smooth', block:'center'})">${cat.split(' ')[1] || cat}</button>`;
    h += `<div id="${catID}" class="pt-2">
            <div class="flex items-center gap-2 mb-3"><div class="w-1 h-3 bg-[var(--primary)] rounded-full"></div><span class="text-xs font-bold text-gray-500 uppercase tracking-widest">${cat}</span></div>`;
    Data[cat].forEach((item, iIdx) => {
      let id = `sv-${gIdx}-${iIdx}`;
      let qtyId = `qty-${gIdx}-${iIdx}`;
      h += `<div class="item-wrapper">
              <input type="checkbox" id="${id}" class="hidden service-cb" data-price="${item.p}" data-name="${item.n}" data-type="${item.type}" data-qty-id="${qtyId}" onchange="toggleQty('${id}', '${qtyId}')">
              <label for="${id}" class="service-label">
                <div class="flex flex-col"><span class="text-gray-700 text-sm">${item.n}</span><span class="text-[10px] text-gray-400">${item.d}</span></div>
                <span class="font-medium text-gray-600">$${item.p}</span>
              </label>
              <input type="number" id="${qtyId}" class="qty-input" value="1" min="1" oninput="calc()">
            </div>`;
    });
    h += `</div>`;
    gIdx++;
  }
  document.getElementById("service-container").innerHTML = h;
  document.getElementById("category-nav").innerHTML = n;
}

function toggleQty(cbId, qtyId) {
  let cb = document.getElementById(cbId);
  let qty = document.getElementById(qtyId);
  if (!cb.checked) qty.value = 1;
  calc();
}

function calc() {
  let rate = parseFloat(document.querySelector('input[name="discount"]:checked').value);
  let cSvc = parseInt(document.getElementById('custom-svc').value) || 0;
  let cProd = parseInt(document.getElementById('custom-prod').value) || 0;
  let cNoDisc = parseInt(document.getElementById('custom-nodisc').value) || 0;
  let deposit = parseInt(document.getElementById('deposit-paid').value) || 0;
  let preDeduct = parseInt(document.getElementById('pre-deduct').value) || 0;
  let coupon = parseInt(document.getElementById('coupon-val').value) || 0;
  
  let svTotal = cSvc - preDeduct, prTotal = cProd, promoTotal = 0;
  
  document.querySelectorAll('.service-cb:checked').forEach(cb => {
    let p = parseInt(cb.dataset.price);
    let t = cb.dataset.type;
    let q = parseInt(document.getElementById(cb.dataset.qtyId).value) || 1;
    let lineTotal = p * q;
    
    if (t === 'service') svTotal += lineTotal;
    else if (t === 'product') prTotal += lineTotal;
    else promoTotal += lineTotal;
  });
  
  let svcAfterDisc = Math.round(Math.max(0, svTotal) * rate) + cNoDisc;
  let prodAfterDisc = Math.round(prTotal * rate) + promoTotal;
  let couponDeduct = Math.min(svcAfterDisc, coupon); 
  let finalTotal = (svcAfterDisc - couponDeduct) + prodAfterDisc;
  document.getElementById('final-total-display').innerText = '$' + finalTotal.toLocaleString();

  let vBal = parseInt(document.getElementById('vip-balance').value) || 0;
  let vTopupOption = parseInt(document.querySelector('input[name="vip-topup"]:checked').value);
  let vTopupValue = (vTopupOption === 5000) ? 5500 : (vTopupOption === 10000 ? 11100 : 0);
  let vTotalWallet = vBal + vTopupValue;
  
  let errorMsgBox = document.getElementById('vip-error-msg');
  let copyBtn = document.getElementById('btn-copy-main');

  if (vTopupOption > 0 && (svcAfterDisc - couponDeduct) > vTopupOption) {
    errorMsgBox.style.display = 'block';
    errorMsgBox.innerText = `⛔ 儲值警告：服務費已超過今日儲值面額。`;
    copyBtn.disabled = true;
    copyBtn.innerText = '❌ 儲值邏輯錯誤 (無法複製)';
    document.getElementById('actual-pay').innerText = '!!';
    return;
  } else {
    errorMsgBox.style.display = 'none';
    copyBtn.disabled = false;
    copyBtn.innerText = '📋 複製結帳明細傳給客人';
  }

  let todayPay = 0;
  if(vBal > 0 || vTopupOption > 0) {
    document.getElementById('vip-summary').classList.remove('hidden');
    document.getElementById('v-total').innerText = '$' + vTotalWallet.toLocaleString();
    let svDeductible = Math.min(vTotalWallet, svcAfterDisc - couponDeduct);
    document.getElementById('v-deduct').innerText = '-$' + svDeductible.toLocaleString();
    document.getElementById('v-remain').innerText = '$' + (vTotalWallet - svDeductible).toLocaleString();
    todayPay = vTopupOption + (svcAfterDisc - couponDeduct - svDeductible) + prodAfterDisc;
  } else {
    document.getElementById('vip-summary').classList.add('hidden');
    todayPay = finalTotal;
  }
  document.getElementById('actual-pay').innerText = Math.max(0, todayPay - deposit).toLocaleString();
}

function copyDetail() {
  let checked = document.querySelectorAll('.service-cb:checked');
  let cSvc = parseInt(document.getElementById('custom-svc').value) || 0;
  let cProd = parseInt(document.getElementById('custom-prod').value) || 0;
  let cNoDisc = parseInt(document.getElementById('custom-nodisc').value) || 0;
  let deposit = parseInt(document.getElementById('deposit-paid').value) || 0;
  let preDeduct = parseInt(document.getElementById('pre-deduct').value) || 0;
  let coupon = parseInt(document.getElementById('coupon-val').value) || 0;
  let rateNode = document.querySelector('input[name="discount"]:checked');
  let rate = parseFloat(rateNode.value);

  let lines = ["【🦋 NaBe 親子采耳 結帳明細】\n"];
  
  let svDiscBase = cSvc - preDeduct, prDiscBase = cProd, promoTotal = 0;
  let svcLines = [];
  checked.forEach(cb => { 
    let q = parseInt(document.getElementById(cb.dataset.qtyId).value) || 1;
    let p = parseInt(cb.dataset.price);
    if (cb.dataset.type === 'service') {
      svcLines.push(`▫️ ${cb.dataset.name}${q > 1 ? ' x' + q : ''}：$${p * q}`);
      svDiscBase += p * q;
    }
  });
  if (cSvc > 0) svcLines.push(`▫️ 彈性服務報價：$${cSvc}`);
  if (preDeduct > 0) svcLines.push(`➖ 項目異動扣除：-$${preDeduct}`);
  if (cNoDisc > 0) svcLines.push(`▫️ 特殊項目(服務/不折扣)：$${cNoDisc}`);
  if (svcLines.length > 0) { lines.push("🔹 【服務項目】"); lines = lines.concat(svcLines); }

  let prodLines = [];
  checked.forEach(cb => { 
    let q = parseInt(document.getElementById(cb.dataset.qtyId).value) || 1;
    let p = parseInt(cb.dataset.price);
    if (cb.dataset.type === 'product') {
      prodLines.push(`▫️ ${cb.dataset.name}${q > 1 ? ' x' + q : ''}：$${p * q}`);
      prDiscBase += p * q;
    } else if (cb.dataset.type === 'promo') {
      prodLines.push(`▫️ ${cb.dataset.name}${q > 1 ? ' x' + q : ''}：$${p * q}`);
      promoTotal += p * q;
    }
  });
  if (cProd > 0) prodLines.push(`▫️ 彈性產品報價：$${cProd}`);
  if (prodLines.length > 0) { lines.push("\n🔹 【保養產品 / 特惠套組】"); lines = lines.concat(prodLines); }

  let svcFinal = Math.round(Math.max(0, svDiscBase) * rate) + cNoDisc;
  let prodFinal = Math.round(prDiscBase * rate) + promoTotal;
  let couponDeduct = Math.min(svcFinal, coupon);
  let finalTotal = svcFinal - couponDeduct + prodFinal;

  lines.push("──────────────────");
  if (rate < 1) {
    let originalTotal = Math.max(0, svDiscBase) + cNoDisc + prDiscBase + promoTotal;
    lines.push(`小計原價：$${originalTotal.toLocaleString()}`);
    lines.push(`套用優惠：${rateNode.nextElementSibling.innerText}`);
    lines.push("──────────────────");
  }
  lines.push(`✅ 本單消費總計：$${finalTotal.toLocaleString()}`);
  lines.push(`   (含服務 $${(svcFinal - couponDeduct).toLocaleString()} + 產品 $${prodFinal.toLocaleString()})`);
  lines.push("");

  let vBal = parseInt(document.getElementById('vip-balance').value) || 0;
  let vTopupOption = parseInt(document.querySelector('input[name="vip-topup"]:checked').value);
  let vTopupValue = (vTopupOption === 5000) ? 5500 : (vTopupOption === 10000 ? 11100 : 0);
  let todayPay = 0;

  if (vBal > 0 || vTopupOption > 0) {
    let vTotalWallet = vBal + vTopupValue;
    let svDeductible = Math.min(vTotalWallet, svcFinal - couponDeduct);
    todayPay = vTopupOption + (svcFinal - couponDeduct - svDeductible) + prodFinal;
    lines.push("👑 【VIP 儲值金紀錄】");
    if (vBal > 0) lines.push(`▫️ 原有儲值餘額：$${vBal.toLocaleString()}`);
    if (vTopupOption > 0) lines.push(`▫️ 今日新增儲值：付款 $${vTopupOption.toLocaleString()} (入帳 $${vTopupValue.toLocaleString()})`);
    lines.push(`▫️ 錢包可用總額：$${vTotalWallet.toLocaleString()}`);
    lines.push(`➖ 扣抵「服務」消費：-$${svDeductible.toLocaleString()}`);
    lines.push(`💰 結帳後剩餘儲值金：$${(vTotalWallet - svDeductible).toLocaleString()}`);
    lines.push("");
    lines.push("🧾 【最後應付金額細項】");
    lines.push(`① 扣除儲值後服務需補差額：$${(svcFinal - couponDeduct - svDeductible).toLocaleString()}`);
    lines.push(`② 今日新增儲值方案費用：$${vTopupOption.toLocaleString()}`);
    lines.push(`③ 保養品/特惠(收現金)：$${prodFinal.toLocaleString()}`);
  } else {
    todayPay = finalTotal;
    lines.push("🧾 【最後應付金額細項】");
    lines.push(`① 服務項目總計：$${(svcFinal - couponDeduct).toLocaleString()}`);
    lines.push(`② 保養品/特惠總計：$${prodFinal.toLocaleString()}`);
  }
  lines.push("──────────────────");
  lines.push(`小計應付總額：$${todayPay.toLocaleString()}`);
  let finalRec = todayPay - deposit;
  if (deposit > 0) {
    lines.push(`➖ 扣除已付定金：-$${deposit.toLocaleString()}`);
    lines.push(`✅ 今日實際需收現金/轉帳：$${Math.max(0, finalRec).toLocaleString()}`);
  } else {
    lines.push(`✅ 今日實際需收現金/轉帳：$${todayPay.toLocaleString()}`);
  }
  lines.push("\n🏦 【付款資訊】\n🔹 銀行：新光銀行 (103)\n🔹 帳號：0222503260002\n\n💳 藍新線上刷卡連結：\nhttps://core.newebpay.com/EPG/NaBe親子采耳/DX7Wdm\n\n這裡麻煩您一下喔～\n付款完成後請再給我 帳號/刷卡卡號 後5碼\n方便核對資料 ✅\n\n謝謝您的蒞臨，期待下次再見！✨");

  let ta = document.createElement("textarea"); ta.value = lines.join('\n');
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  let t = document.getElementById("toast"); t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500);
}

function resetForm() {
  document.querySelectorAll('input[type="number"]').forEach(i => i.value = (i.className.includes('qty-input') ? 1 : ''));
  document.getElementById('d-none').checked = true;
  document.getElementById('vt-0').checked = true;
  document.querySelectorAll('.service-cb').forEach(cb => cb.checked = false);
  calc();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onscroll = function() {
  let btn = document.getElementById("btn-top");
  if (window.scrollY > 200) btn.classList.add("show"); else btn.classList.remove("show");
};

render();
calc();
</script>
</body>
