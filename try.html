<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NABE 智能面診系統體驗版 | 專業皮脂腺理學分析</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 增加一些高質感的漸層動畫背景 */
    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .animate-scan {
      animation: scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    /* 掃光特效 */
    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }
    .animate-shine {
      animation: shine 4s infinite;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#e4eff8] via-[#ebe6f4] to-[#f7e8e3] min-h-screen text-[#4a4a59] font-sans antialiased relative">
  
  <!-- 仙氣背景光暈 -->
  <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#e4eff8] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 pointer-events-none"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#f7e8e3] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 pointer-events-none"></div>

  <div id="root" class="relative z-10"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 ---
    const Sparkles = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
    );
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const BookOpen = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );
    const MessageCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
    );
    const RefreshCw = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const ScanFace = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/></svg>
    );
    const Cpu = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
    );
    const Lightbulb = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
    );

    // --- 測驗題目與資料 ---
    const QUIZ_QUESTIONS = [
      {
        id: 1,
        question: "洗完臉後大約多久，您的臉部會開始感覺出油？",
        options: [
          { text: "幾乎不出油，甚至覺得緊繃、有時會脫皮", type: "dry" },
          { text: "T字部位(額頭/鼻子)很快出油，但兩頰覺得乾", type: "combination" },
          { text: "不到 1 小時，全臉就明顯泛油光", type: "oily" },
          { text: "感覺剛剛好，不會特別乾也不會特別油", type: "normal" }
        ]
      },
      {
        id: 2,
        question: "透過鏡子觀察您的毛孔狀態，最符合以下哪一種？",
        options: [
          { text: "幾乎看不見毛孔，像水煮蛋般平滑細緻", type: "normal" },
          { text: "毛孔極細，但眼周或嘴角容易出現小細紋", type: "dry" },
          { text: "全臉毛孔粗大(呈圓形)，容易有黑頭/白頭粉刺", type: "oily" },
          { text: "只有 T 字部位毛孔明顯，兩頰毛孔細緻", type: "combination" }
        ]
      },
      {
        id: 3,
        question: "平時觸摸自己的臉頰，最常感覺到的觸感是？",
        options: [
          { text: "柔軟、富有彈性，不乾澀也不油膩", type: "normal" },
          { text: "粗糙，洗臉後極度緊繃，有時會摸到脫屑", type: "dry" },
          { text: "油膩、厚硬，感覺角質層比較肥厚", type: "oily" },
          { text: "額頭跟鼻子摸起來油膩，臉頰卻乾燥緊繃", type: "combination" }
        ]
      }
    ];

    const SKIN_TYPES_INFO = {
      normal: {
        name: "中性肌膚",
        subtitle: "水多油少",
        desc: "理想的油水平衡肌，毛孔細小不明顯，表面平滑細緻，氣色紅潤有光澤。",
        focus: "防護勝於事後修護。維持現狀，加強防曬與基礎保濕。",
        ingredients: ["維他命C", "基礎玻尿酸", "Q10 (維持抗氧化)"],
        warning: "雖然目前狀態極佳，但隨年齡增長極易因疏忽保養而轉為乾性敏感肌。建議提早開始【基礎抗老與深層鎖水課程】，將最完美的膚況凍齡！"
      },
      dry: {
        name: "乾性肌膚",
        subtitle: "缺水缺油",
        desc: "膚色較暗沉無光，洗臉後極度緊繃，容易出現細紋(眼周、嘴角)與脫屑現象。",
        focus: "「補油」大於「補水」。修復受損屏障，封閉性保濕防止水分流失。",
        ingredients: ["神經醯胺", "角鯊烷", "乳油木果油", "膠原蛋白"],
        warning: "未來 28 天肌膚代謝週期若持續缺水，極易引發敏感、長斑與不可逆的「靜態皺紋」！建議盡早規劃【深層保濕與基礎抗老管理】，預防斷崖式衰老。"
      },
      oily: {
        name: "油性肌膚",
        subtitle: "多水多油",
        desc: "全臉泛油光，毛孔粗大，極易產生痤瘡(痘痘)與粉刺，角質層肥厚。",
        focus: "控油與深層清潔。選用無油配方，著重油水平衡而非完全去油。",
        ingredients: ["水楊酸", "茶樹精油", "維他命B3 (菸鹼醯胺)", "鋅"],
        warning: "長期過度分泌油脂，不僅會撐大毛孔形成「橘皮臉」，更是蠕形蟎蟲最愛的溫床。建議定期安排【專業無創清粉刺與煥膚】，從根本調理皮脂微環境！"
      },
      combination: {
        name: "混合性肌膚",
        subtitle: "缺水多油",
        desc: "現代成年人最常見膚質。T字部位出油毛孔明顯，兩頰乾燥甚至脫屑。",
        focus: "「分區保養」。控油與補水併行，隨環境調整保養比重。",
        ingredients: ["玻尿酸 (全臉補水)", "胜肽 (兩頰抗老)", "酸性成分 (T區收斂)"],
        warning: "隨著膠原蛋白流失，兩頰會越來越乾癟長出細紋，T字部位卻因代償作用狂冒粉刺。建議預約【分區客製化調理】，精準解決兩極化的肌膚困境！"
      }
    };

    // --- 主程式 ---
    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [result, setResult] = useState(null);
      const [selectedOptionIndex, setSelectedOptionIndex] = useState(null);
      const [isAnalyzing, setIsAnalyzing] = useState(false); 
      const [progress, setProgress] = useState(0); 

      // 模擬進度條跳動
      useEffect(() => {
        let interval;
        if (isAnalyzing) {
          setProgress(0);
          interval = setInterval(() => {
            setProgress(prev => {
              const jump = Math.floor(Math.random() * 15) + 5;
              return prev + jump >= 100 ? 100 : prev + jump;
            });
          }, 200);
        }
        return () => clearInterval(interval);
      }, [isAnalyzing]);

      const handleAnswer = (type, index) => {
        if (selectedOptionIndex !== null || isAnalyzing) return;
        
        setSelectedOptionIndex(index);

        setTimeout(() => {
          const newAnswers = [...answers, type];
          setAnswers(newAnswers);

          if (currentStep < QUIZ_QUESTIONS.length - 1) {
            setCurrentStep(currentStep + 1);
            setSelectedOptionIndex(null);
          } else {
            setIsAnalyzing(true);
            setSelectedOptionIndex(null);
            
            setTimeout(() => {
              calculateResult(newAnswers);
              setIsAnalyzing(false);
            }, 3000); 
          }
        }, 500);
      };

      const calculateResult = (finalAnswers) => {
        const counts = finalAnswers.reduce((acc, type) => {
          acc[type] = (acc[type] || 0) + 1;
          return acc;
        }, {});

        const topType = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        setResult(topType);
      };

      const resetQuiz = () => {
        setCurrentStep(0);
        setAnswers([]);
        setResult(null);
        setSelectedOptionIndex(null);
        setProgress(0);
      };

      return (
        <div className="flex items-center justify-center p-4 min-h-screen">
          <div className="max-w-xl w-full bg-white/60 backdrop-blur-2xl rounded-3xl shadow-[0_20px_50px_rgba(110,104,132,0.15)] overflow-hidden border border-white relative z-10 transition-all duration-500">
            
            {/* Header */}
            <div className="bg-gradient-to-r from-[#6e6884] to-[#8a84a3] p-6 text-center text-white relative overflow-hidden">
              <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-30"></div>
              
              <div className="relative z-10 flex flex-col items-center">
                <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm border border-white/30 mb-3 shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                  <Cpu className="w-6 h-6 text-white" />
                </div>
                <h1 className="text-xl md:text-2xl font-bold tracking-widest drop-shadow-md text-white">NABE 智能面診系統體驗版</h1>
                <p className="text-xs mt-2 text-white/80 tracking-widest uppercase font-light">Advanced Skin Analysis</p>
              </div>
            </div>

            <div className="p-6 sm:p-8 min-h-[400px] flex flex-col justify-center">
              
              {/* --- 狀態 1：AI 演算掃描中 --- */}
              {isAnalyzing ? (
                <div className="flex flex-col items-center justify-center space-y-8 py-8 animate-in zoom-in duration-500">
                  <div className="relative w-32 h-32 flex items-center justify-center">
                    <div className="absolute inset-0 border-4 border-dashed border-[#8a84a3]/40 rounded-full animate-[spin_4s_linear_infinite]"></div>
                    <div className="absolute inset-2 border-2 border-[#6e6884]/30 rounded-full animate-ping"></div>
                    <div className="absolute inset-4 bg-gradient-to-tr from-[#e4eff8] to-[#ebe6f4] rounded-full blur-sm opacity-90 animate-pulse border border-[#8a84a3]/20"></div>
                    <div className="absolute inset-4 overflow-hidden rounded-full">
                      <div className="w-full h-1 bg-[#6e6884] shadow-[0_0_10px_#6e6884] absolute animate-scan"></div>
                    </div>
                    <ScanFace className="w-10 h-10 text-[#6e6884] relative z-10 drop-shadow-sm" />
                  </div>
                  
                  <div className="text-center w-full max-w-xs">
                    <h3 className="text-lg font-bold text-[#4a4a59] mb-2 tracking-widest">系統演算中...</h3>
                    <p className="text-[#8a84a3] text-sm mb-4 font-light">正在深度分析您的皮脂微環境數據</p>
                    <div className="h-1.5 w-full bg-white rounded-full overflow-hidden shadow-inner border border-gray-100">
                      <div 
                        className="h-full bg-gradient-to-r from-[#6e6884] to-[#8a84a3] transition-all duration-200 ease-out relative"
                        style={{ width: `${progress}%` }}
                      >
                        <div className="absolute top-0 right-0 bottom-0 w-4 bg-white/50 blur-[2px]"></div>
                      </div>
                    </div>
                    <p className="text-xs text-[#8a84a3] mt-2 font-mono">{progress}% COMPLETE</p>
                  </div>
                </div>
              ) : 
              
              /* --- 狀態 2：測驗進行中 --- */
              !result ? (
                <div className="space-y-6 animate-in fade-in duration-500">
                  <div className="flex justify-between items-center mb-4">
                    <span className="text-xs font-bold text-[#8a84a3] tracking-widest uppercase">
                      Analysis Step 0{currentStep + 1} <span className="text-[#c2bccc]">/ 0{QUIZ_QUESTIONS.length}</span>
                    </span>
                    <div className="h-1.5 flex-1 mx-4 bg-white rounded-full overflow-hidden shadow-inner">
                      <div 
                        className="h-full bg-[#6e6884] transition-all duration-500 ease-out"
                        style={{ width: `${((currentStep + 1) / QUIZ_QUESTIONS.length) * 100}%` }}
                      ></div>
                    </div>
                  </div>

                  <h2 className="text-lg sm:text-xl font-bold text-[#4a4a59] leading-relaxed mb-6">
                    {QUIZ_QUESTIONS[currentStep].question}
                  </h2>

                  <div className="space-y-3">
                    {QUIZ_QUESTIONS[currentStep].options.map((option, index) => {
                      const isSelected = selectedOptionIndex === index;
                      const isWaiting = selectedOptionIndex !== null;

                      return (
                        <button
                          key={index}
                          onClick={() => handleAnswer(option.type, index)}
                          disabled={isWaiting}
                          className={`w-full text-left p-4 rounded-2xl border transition-all duration-300 flex items-center group
                            ${isSelected 
                              ? 'border-[#6e6884] bg-white shadow-md scale-[1.02] ring-2 ring-[#6e6884]/10' 
                              : 'border-white bg-white/50 hover:border-[#8a84a3]/40 hover:bg-white hover:shadow-sm'
                            }
                            ${isWaiting && !isSelected ? 'opacity-40 cursor-not-allowed' : ''}
                          `}
                        >
                          <div className={`w-5 h-5 rounded-full border-2 mr-4 flex-shrink-0 flex items-center justify-center transition-colors
                            ${isSelected ? 'border-[#6e6884]' : 'border-[#c2bccc] group-hover:border-[#8a84a3]'}
                          `}>
                            <div className={`w-2 h-2 rounded-full bg-[#6e6884] transition-all duration-200 
                              ${isSelected ? 'opacity-100 scale-100' : 'opacity-0 scale-50 group-hover:opacity-50'}
                            `}></div>
                          </div>
                          <span className={`font-medium leading-relaxed transition-colors text-sm sm:text-base
                            ${isSelected ? 'text-[#4a4a59] font-bold' : 'text-[#5c5c6d] group-hover:text-[#4a4a59]'}
                          `}>
                            {option.text}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ) : (
                
                /* --- 狀態 3：檢測結果報告 --- */
                <div className="space-y-6 animate-in slide-in-from-bottom-6 duration-700">
                  <div className="text-center relative">
                    <div className="inline-flex px-3 py-1 bg-white text-[#6e6884] text-xs font-bold rounded-full mb-3 tracking-widest border border-white shadow-sm flex items-center gap-1.5 mx-auto">
                      <div className="w-1.5 h-1.5 bg-[#06C755] rounded-full animate-pulse"></div>
                      AI 分析完成
                    </div>
                    <h2 className="text-sm text-[#8a84a3] mb-1 font-light tracking-wide">您的皮脂環境分析為</h2>
                    <div className="text-3xl font-extrabold text-[#4a4a59] flex items-center justify-center gap-2 mt-1 drop-shadow-sm">
                      {SKIN_TYPES_INFO[result].name}
                      <span className="text-lg font-normal text-[#8a84a3] px-2 py-0.5 bg-white/80 rounded-md shadow-sm border border-white">
                        {SKIN_TYPES_INFO[result].subtitle}
                      </span>
                    </div>
                  </div>

                  <div className="bg-white/80 backdrop-blur-md p-6 rounded-2xl border border-white shadow-sm space-y-5">
                    <div>
                      <h3 className="text-sm font-bold text-[#6e6884] flex items-center gap-2 mb-2 tracking-wide">
                        <ScanFace className="w-4 h-4 text-[#8a84a3]" /> 表皮特徵解析
                      </h3>
                      <p className="text-[#5c5c6d] text-sm leading-relaxed">
                        {SKIN_TYPES_INFO[result].desc}
                      </p>
                    </div>
                    
                    <div className="h-px bg-gradient-to-r from-transparent via-[#dcd8e6] to-transparent w-full"></div>

                    <div>
                      <h3 className="text-sm font-bold text-[#6e6884] flex items-center gap-2 mb-2 tracking-wide">
                        <Sparkles className="w-4 h-4 text-[#8a84a3]" /> 專屬保養配方
                      </h3>
                      <p className="text-[#5c5c6d] text-sm leading-relaxed mb-3">
                        {SKIN_TYPES_INFO[result].focus}
                      </p>
                      
                      <div className="flex flex-wrap gap-2">
                        {SKIN_TYPES_INFO[result].ingredients.map((ing, idx) => (
                          <span key={idx} className="px-3 py-1 bg-white border border-[#e2def0] text-[#6e6884] text-xs font-medium rounded-md shadow-sm">
                            {ing}
                          </span>
                        ))}
                      </div>
                    </div>

                    {/* 溫馨提醒預警區塊 */}
                    <div className="mt-4 p-4 bg-gradient-to-r from-[#f7e8e3]/60 to-transparent rounded-xl border-l-4 border-[#d6a8a8] relative overflow-hidden group/warning shadow-sm">
                      <div className="absolute right-0 top-1/2 -translate-y-1/2 opacity-10 pointer-events-none transition-transform duration-700 group-hover/warning:rotate-12 group-hover/warning:scale-125">
                        <Lightbulb className="w-20 h-20 text-[#c28e8e]" />
                      </div>
                      <h4 className="text-sm font-bold text-[#b57f7f] flex items-center gap-1.5 mb-2 relative z-10">
                        <Lightbulb className="w-4 h-4" /> NABE 專業未來預警
                      </h4>
                      <p className="text-[#5c5c6d] text-sm leading-relaxed relative z-10 font-medium">
                        {SKIN_TYPES_INFO[result].warning}
                      </p>
                    </div>

                  </div>

                  {/* ★ 頂級專櫃感 Upsell / CTA Section ★ */}
                  <div className="mt-8 bg-white/90 backdrop-blur-xl p-6 sm:p-8 rounded-2xl text-left shadow-[0_15px_40px_-10px_rgba(110,104,132,0.2)] relative overflow-hidden border-2 border-white/80">
                    <div className="absolute -top-10 -right-10 w-40 h-40 bg-gradient-to-bl from-[#f7e8e3]/60 to-transparent rounded-full blur-2xl pointer-events-none"></div>
