<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四大肌膚檢測體驗版 | nabe 親子采耳 & 皮膚管理</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- 圖示元件 ---
    const Sparkles = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
    );
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const BookOpen = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );
    const MessageCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
    );
    const RefreshCw = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );

    // --- 測驗題目與資料 ---
    const QUIZ_QUESTIONS = [
      {
        id: 1,
        question: "洗完臉後大約多久，你的臉部會開始感覺出油？",
        options: [
          { text: "幾乎不出油，甚至覺得緊繃、有時會脫皮", type: "dry" },
          { text: "T字部位(額頭/鼻子)很快出油，但兩頰覺得乾", type: "combination" },
          { text: "不到 1 小時，全臉就明顯泛油光", type: "oily" },
          { text: "感覺剛剛好，不會特別乾也不會特別油", type: "normal" }
        ]
      },
      {
        id: 2,
        question: "對照鏡子觀察你的毛孔狀態，最符合以下哪一種？",
        options: [
          { text: "幾乎看不見毛孔，像水煮蛋般平滑細緻", type: "normal" },
          { text: "毛孔極細，但眼周或嘴角容易出現小細紋", type: "dry" },
          { text: "全臉毛孔粗大(呈圓形)，容易有黑頭/白頭粉刺", type: "oily" },
          { text: "只有 T 字部位毛孔明顯，兩頰毛孔細緻", type: "combination" }
        ]
      },
      {
        id: 3,
        question: "平時摸自己的臉頰，最常感覺到的觸感是？",
        options: [
          { text: "柔軟、富有彈性，不乾澀也不油膩", type: "normal" },
          { text: "粗糙，洗臉後極度緊繃，有時會摸到脫屑", type: "dry" },
          { text: "油膩、厚硬，感覺角質層比較肥厚", type: "oily" },
          { text: "額頭跟鼻子摸起來油膩，但臉頰摸起來乾燥緊繃", type: "combination" }
        ]
      }
    ];

    const SKIN_TYPES_INFO = {
      normal: {
        name: "中性肌膚",
        subtitle: "水多油少",
        desc: "理想的油水平衡肌，毛孔細小不明顯，表面平滑細緻，氣色紅潤有光澤。",
        focus: "預防勝於治療。維持現狀，加強防曬與基礎保濕。",
        ingredients: ["維他命C", "基礎玻尿酸", "Q10 (維持抗氧化)"]
      },
      dry: {
        name: "乾性肌膚",
        subtitle: "缺水缺油",
        desc: "膚色較暗沉無光，洗臉後極度緊繃，容易出現細紋(眼周、嘴角)與脫屑現象。",
        focus: "「補油」大於「補水」。修復受損屏障，封閉性保濕防止水分流失。",
        ingredients: ["神經醯胺", "角鯊烷", "乳油木果油", "膠原蛋白"]
      },
      oily: {
        name: "油性肌膚",
        subtitle: "多水多油",
        desc: "全臉泛油光，毛孔粗大，極易產生痤瘡(痘痘)與粉刺，角質層肥厚。",
        focus: "控油與深層清潔。選用無油配方，著重油水平衡而非完全去油。",
        ingredients: ["水楊酸", "茶樹精油", "維他命B3 (菸鹼醯胺)", "鋅"]
      },
      combination: {
        name: "混合性肌膚",
        subtitle: "缺水多油",
        desc: "現代成年人最常見膚質。T字部位(額頭/鼻子/下巴)出油毛孔明顯，兩頰乾燥甚至脫屑。",
        focus: "「分區保養」。控油與補水併行，隨環境調整保養比重。",
        ingredients: ["玻尿酸 (全臉補水)", "胜肽 (兩頰抗老)", "酸性成分 (T區收斂)"]
      }
    };

    // --- 主程式 ---
    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [result, setResult] = useState(null);
      // 新增：用來記錄目前選中的選項索引
      const [selectedOptionIndex, setSelectedOptionIndex] = useState(null);

      const handleAnswer = (type, index) => {
        // 防止重複點擊
        if (selectedOptionIndex !== null) return;
        
        // 1. 先記錄選中狀態，讓選項亮起
        setSelectedOptionIndex(index);

        // 2. 延遲 0.5 秒後才切換下一題 (讓客人看清楚自己選了什麼)
        setTimeout(() => {
          const newAnswers = [...answers, type];
          setAnswers(newAnswers);

          if (currentStep < QUIZ_QUESTIONS.length - 1) {
            setCurrentStep(currentStep + 1);
            setSelectedOptionIndex(null); // 切換題目時清空選取狀態
          } else {
            calculateResult(newAnswers);
          }
        }, 500); // 500毫秒 = 0.5秒
      };

      const calculateResult = (finalAnswers) => {
        const counts = finalAnswers.reduce((acc, type) => {
          acc[type] = (acc[type] || 0) + 1;
          return acc;
        }, {});

        const topType = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        setResult(topType);
      };

      const resetQuiz = () => {
        setCurrentStep(0);
        setAnswers([]);
        setResult(null);
        setSelectedOptionIndex(null);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-[#e4eff8] via-[#ebe6f4] to-[#f7e8e3] flex items-center justify-center p-4 font-sans text-[#4a4a59]">
          <div className="max-w-xl w-full bg-white/70 backdrop-blur-lg rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] overflow-hidden border border-white/80">
            
            {/* Header */}
            <div className="bg-gradient-to-r from-[#6e6884] to-[#8a84a3] p-6 text-center text-white relative">
              <Sparkles className="absolute top-6 left-6 opacity-20 w-8 h-8" />
              <h1 className="text-2xl font-bold tracking-wider drop-shadow-sm">四大肌膚檢測體驗版</h1>
              <p className="text-sm mt-2 text-white/90 drop-shadow-sm">nabe 親子采耳 & 皮膚管理</p>
            </div>

            <div className="p-6 sm:p-8">
              
              {/* Quiz Flow */}
              {!result ? (
                <div className="space-y-6">
                  <div className="flex justify-between items-center mb-4">
                    <span className="text-sm font-medium text-[#8a84a3]">
                      第 {currentStep + 1} / {QUIZ_QUESTIONS.length} 題
                    </span>
                    <div className="h-2 flex-1 mx-4 bg-white/60 rounded-full overflow-hidden shadow-inner">
                      <div 
                        className="h-full bg-[#6e6884] transition-all duration-500 ease-out"
                        style={{ width: `${((currentStep + 1) / QUIZ_QUESTIONS.length) * 100}%` }}
                      ></div>
                    </div>
                  </div>

                  <h2 className="text-xl font-semibold text-[#4a4a59] leading-relaxed mb-6 transition-opacity duration-300">
                    {QUIZ_QUESTIONS[currentStep].question}
                  </h2>

                  <div className="space-y-3">
                    {QUIZ_QUESTIONS[currentStep].options.map((option, index) => {
                      // 判斷這個選項是否被選中
                      const isSelected = selectedOptionIndex === index;
                      // 判斷是否正在切換中 (鎖定其他按鈕)
                      const isWaiting = selectedOptionIndex !== null;

                      return (
                        <button
                          key={index}
                          onClick={() => handleAnswer(option.type, index)}
                          disabled={isWaiting}
                          className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-300 flex items-center group shadow-sm 
                            ${isSelected 
                              ? 'border-[#6e6884] bg-white/90 shadow-md scale-[1.01]' 
                              : 'border-white bg-white/50 hover:border-[#8a84a3] hover:bg-white/80 hover:shadow-md'
                            }
                            ${isWaiting && !isSelected ? 'opacity-50 cursor-not-allowed' : ''}
                          `}
                        >
                          <div className={`w-6 h-6 rounded-full border-2 mr-4 flex-shrink-0 flex items-center justify-center transition-colors bg-white 
                            ${isSelected ? 'border-[#6e6884]' : 'border-[#c2bccc] group-hover:border-[#6e6884]'}
                          `}>
                            <div className={`w-2 h-2 rounded-full bg-[#6e6884] transition-opacity 
                              ${isSelected ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}
                            `}></div>
                          </div>
                          <span className={`font-medium leading-relaxed transition-colors 
                            ${isSelected ? 'text-[#4a4a59]' : 'text-[#5c5c6d] group-hover:text-[#4a4a59]'}
                          `}>
                            {option.text}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ) : (
                /* Result Screen */
                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  <div className="text-center">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white mb-4 shadow-sm border border-[#e2def0]">
                      <CheckCircle2 className="w-8 h-8 text-[#6e6884]" />
                    </div>
                    <h2 className="text-xl text-[#8a84a3] mb-1">您的基礎檢測結果為</h2>
                    <div className="text-3xl font-bold text-[#4a4a59] flex items-center justify-center gap-2">
                      {SKIN_TYPES_INFO[result].name}
                      <span className="text-lg font-normal text-[#8a84a3]">({SKIN_TYPES_INFO[result].subtitle})</span>
                    </div>
                  </div>

                  <div className="bg-white/60 backdrop-blur-sm p-5 rounded-2xl border border-white space-y-4 shadow-sm">
                    <div>
                      <h3 className="text-sm font-bold text-[#6e6884] flex items-center gap-2 mb-2">
                        <BookOpen className="w-4 h-4 text-[#8a84a3] mr-2" /> 外觀特徵
                      </h3>
                      <p className="text-[#5c5c6d] text-sm leading-relaxed">
                        {SKIN_TYPES_INFO[result].desc}
                      </p>
                    </div>
                    
                    <div className="h-px bg-gradient-to-r from-transparent via-[#dcd8e6] to-transparent w-full"></div>

                    <div>
                      <h3 className="text-sm font-bold text-[#6e6884] flex items-center gap-2 mb-2">
                        <Sparkles className="w-4 h-4 text-[#8a84a3] mr-2" /> 保養重點
                      </h3>
                      <p className="text-[#5c5c6d] text-sm leading-relaxed mb-3">
                        {SKIN_TYPES_INFO[result].focus}
                      </p>
                      
                      <div className="flex flex-wrap gap-2">
                        {SKIN_TYPES_INFO[result].ingredients.map((ing, idx) => (
                          <span key={idx} className="px-3 py-1 bg-white border border-[#e2def0] text-[#6e6884] text-xs rounded-full shadow-sm">
                            {ing}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Upsell / CTA Section (加入了懸念鉤子與課程介紹) */}
                  <div className="mt-8 bg-gradient-to-br from-[#6e6884] to-[#4a4a59] p-6 sm:p-8 rounded-2xl text-left shadow-lg relative overflow-hidden border border-[#8a84a3]">
                    {/* 背景裝飾 */}
                    <Sparkles className="absolute -top-4 -right-4 w-32 h-32 text-white opacity-5 pointer-events-none" />
                    <div className="absolute top-0 right-0 w-full h-full bg-gradient-to-b from-transparent to-black/20 pointer-events-none"></div>

                    <div className="relative z-10">
                      <h3 className="font-bold text-lg md:text-xl mb-2 text-[#f7e8e3] flex items-center gap-2">
                        <span className="text-2xl">⚠️</span> 等等！這只是最基礎的表層判斷...
                      </h3>
                      <p className="text-sm md:text-base text-white/90 mb-5 leading-relaxed font-light">
                        為什麼客人買了適合的保養品，還是狂長痘、大脫皮？<br/>
                        因為真正的魔鬼藏在「<span className="font-bold text-white border-b border-[#e4eff8]/50 pb-0.5">皮脂腺微環境</span>」與「<span className="font-bold text-white border-b border-[#e4eff8]/50 pb-0.5">AI 深層數據</span>」裡！
                      </p>

                      <div className="bg-white/10 backdrop-blur-md rounded-xl p-5 mb-6 border border-white/20 shadow-inner">
                        <h4 className="text-sm md:text-base font-bold mb-4 text-[#e4eff8] flex items-center gap-2">
                          <BookOpen className="w-4 h-4" /> 解鎖【皮脂腺理學淨化管理師】你將學會：
                        </h4>
                        <ul className="text-sm space-y-3.5 text-white/85">
                           <li className="flex items-start gap-3">
                             <div className="bg-[#06C755]/20 rounded-full p-1 mt-0.5 shrink-0"><CheckCircle2 className="w-3.5 h-3.5 text-[#06C755]"/></div>
                             <span className="leading-snug"><strong className="text-white tracking-wide">四大肌膚 ╳ 多種膚況：</strong>突破盲點，精準判讀深層隱性變異膚況，不再憑感覺猜測。</span>
                           </li>
                           <li className="flex items-start gap-3">
                             <div className="bg-[#06C755]/20 rounded-full p-1 mt-0.5 shrink-0"><CheckCircle2 className="w-3.5 h-3.5 text-[#06C755]"/></div>
                             <span className="leading-snug"><strong className="text-white tracking-wide">純手技地毯式清法：</strong>借力使力，減少皮損。沒有過多機器也能清超乾淨，讓你賺的有技術質量！</span>
                           </li>
                           <li className="flex items-start gap-3">
                             <div className="bg-[#06C755]/20 rounded-full p-1 mt-0.5 shrink-0"><CheckCircle2 className="w-3.5 h-3.5 text-[#06C755]"/></div>
                             <span className="leading-snug"><strong className="text-white tracking-wide">科技輔助：</strong>善用 AI 加快精準面診，大幅提升客戶信任度與專業感。</span>
                           </li>
                           <li className="flex items-start gap-3">
                             <div className="bg-[#06C755]/20 rounded-full p-1 mt-0.5 shrink-0"><CheckCircle2 className="w-3.5 h-3.5 text-[#06C755]"/></div>
                             <span className="leading-snug"><strong className="text-white tracking-wide">獨家配方：</strong>針對客製化問題，開立高單價、高成效的專屬保養菜單。</span>
                           </li>
                           <li className="flex items-start gap-3">
                             <div className="bg-[#06C755]/20 rounded-full p-1 mt-0.5 shrink-0"><CheckCircle2 className="w-3.5 h-3.5 text-[#06C755]"/></div>
                             <span className="leading-snug"><strong className="text-white tracking-wide">法律避雷：</strong>掌握美容契約與法規界線，不做違法事，保護自己更保護錢包。</span>
                           </li>
                           <li className="flex items-start gap-3">
                             <div className="bg-[#06C755]/20 rounded-full p-1 mt-0.5 shrink-0"><CheckCircle2 className="w-3.5 h-3.5 text-[#06C755]"/></div>
                             <span className="leading-snug"><strong className="text-white tracking-wide">定價策略：</strong>創業者必學成本計算！拒絕盲目跟風 999，定出真正獲利的專屬價格。</span>
                           </li>
                        </ul>

                        {/* --- 新增：超強懸念與贈品鉤子區塊 --- */}
                        <div className="mt-5 p-4 bg-gradient-to-r from-[#06C755]/15 to-transparent rounded-xl border-l-4 border-[#06C755] relative overflow-hidden group/bonus shadow-sm">
                          <Sparkles className="absolute -right-2 -bottom-2 w-12 h-12 text-[#06C755] opacity-20 group-hover/bonus:scale-110 transition-transform duration-500" />
                          <p className="font-bold text-[#e4eff8] text-sm md:text-base mb-1.5 flex items-center gap-2 relative z-10">
                            <span className="bg-[#06C755] text-white text-xs px-2 py-0.5 rounded shadow-sm tracking-wide">專屬結業大禮</span>
                            送你「同款 AI 檢測小工具」模組！
                          </p>
                          <p className="text-white/85 text-xs md:text-sm leading-relaxed relative z-10 font-light">
                            不用自己花大錢找工程師！結業直接把這套超吸睛的檢測系統帶回家，換上你的品牌名稱，幫你專業提升、加快精準判斷，降低客人客訴問題！
                          </p>
                        </div>
                        {/* --- 新增結束 --- */}

                      </div>

                      <a 
                        href="https://lin.ee/Y9XXmpL" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="flex items-center justify-center w-full px-6 py-4 bg-[#06C755] hover:bg-[#05b34c] text-white font-bold rounded-xl transition-all shadow-[0_0_20px_rgba(6,199,85,0.4)] hover:shadow-[0_0_25px_rgba(6,199,85,0.6)] hover:-translate-y-0.5 gap-2 group"
                      >
                        <MessageCircle className="w-5 h-5 group-hover:animate-pulse" />
                        <span className="text-base md:text-lg">立即加入 LINE 索取完整課程大綱</span>
                        <ChevronRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                      </a>
                    </div>
                  </div>

                  <div className="pt-4 text-center">
                    <button 
                      onClick={resetQuiz}
                      className="inline-flex items-center gap-2 text-[#8a84a3] hover:text-[#6e6884] transition-colors text-sm font-medium"
                    >
                      <RefreshCw className="w-4 h-4" /> 重新測驗
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
